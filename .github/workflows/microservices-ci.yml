name: microservices-ci

on:
  pull_request:
    paths:
      - "microservices/**"
      - ".github/workflows/microservices-ci.yml"
  push:
    branches: [master, main]
    paths:
      - "microservices/**"
      - ".github/workflows/microservices-ci.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: microservices unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: microservices/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymysql pytest pytest-cov

      - name: Run tests with coverage
        working-directory: microservices
        run: |
          pytest tests/test_lambdas.py \
            --cov=AutoDebitService \
            --cov=BankStatementService \
            --cov=CustomerOnboardingService \
            --cov=DisbursementService \
            --cov=KYCService \
            --cov=SupportService \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=pytest-report.xml \
            -v

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: microservices-coverage
          path: |
            microservices/coverage.xml
            microservices/pytest-report.xml
          if-no-files-found: warn

      - name: Coverage gate (fail if < 70%)
        if: matrix.python-version == '3.11'
        working-directory: microservices
        run: |
          python - <<'PY'
          import sys, xml.etree.ElementTree as ET
          rate = float(ET.parse("coverage.xml").getroot().attrib["line-rate"])
          pct = rate * 100
          print(f"Line coverage: {pct:.2f}%")
          if pct < 70.0:
              print("::error::Coverage below 70% gate", file=sys.stderr)
              sys.exit(1)
          PY
