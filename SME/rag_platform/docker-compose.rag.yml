services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5433:5432"
    volumes:
      - ./backend/sql/001_rag_schema.sql:/docker-entrypoint-initdb.d/001_rag_schema.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rag-backend:
    build: ./backend
    volumes:
      - ../:/workspace:ro
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@pgvector:5432/app
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8010:8010"
    depends_on:
      - pgvector
      - redis
