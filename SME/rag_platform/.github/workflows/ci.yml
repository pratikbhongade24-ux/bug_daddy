name: rag-platform-ci

on:
  push:
    paths:
      - 'rag_platform/**'
  pull_request:
    paths:
      - 'rag_platform/**'

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag_platform/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest -q
