services:
  sonarqube:
    image: sonarqube:community
    restart: unless-stopped
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://${SONAR_DB_HOST:-localhost}:${SONAR_DB_PORT:-5432}/${SONAR_DB_NAME:-sonarqube}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-replace-with-generated-password}
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  scanner:
    image: sonarsource/sonar-scanner-cli:latest
    depends_on:
      - sonarqube
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-replace-with-sonarqube-token}
    volumes:
      - ${SONAR_REPO_PATH:-/opt/sonarqube/bug_daddy}:/usr/src:ro
    command:
      - sonar-scanner
      - -Dsonar.projectKey=${SONAR_PROJECT_KEY:-bugdaddy}
      - -Dsonar.projectName=${SONAR_PROJECT_NAME:-BugDaddy}
      - -Dsonar.sources=/usr/src
      - -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/package-lock.json,**/.git/**

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
