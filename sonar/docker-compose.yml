services:\n  sonarqube:\n    image: sonarqube:10.4-community\n    restart: unless-stopped\n    environment:\n      SONAR_JDBC_URL: jdbc:postgresql://${SONAR_DB_HOST:-bugdaddy-sonarqube-postgres.ctkcsksi0yjl.ap-south-1.rds.amazonaws.com}:${SONAR_DB_PORT:-5432}/${SONAR_DB_NAME:-sonarqube}\n      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:-sonar}\n      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-replace-with-generated-password}\n    ports:\n      - \"127.0.0.1:9000:9000\"\n    volumes:\n      - sonarqube_data:/opt/sonarqube/data\n      - sonarqube_extensions:/opt/sonarqube/extensions\n      - sonarqube_logs:/opt/sonarqube/logs\n\n  scanner:\n    image: sonarsource/sonar-scanner-cli:5.0\n    depends_on:\n      - sonarqube\n    environment:\n      SONAR_HOST_URL: http://sonarqube:9000\n      SONAR_TOKEN: ${SONAR_TOKEN:-replace-with-sonarqube-token}\n    volumes:\n      - ${SONAR_REPO_PATH:-/opt/sonarqube/bug_daddy}:/usr/src:ro\n    command:\n      - sonar-scanner\n      - -Dsonar.projectKey=${SONAR_PROJECT_KEY:-bugdaddy}\n      - -Dsonar.projectName=${SONAR_PROJECT_NAME:-BugDaddy}\n      - -Dsonar.sources=/usr/src/microservices,/usr/src/agents\n      - -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/package-lock.json,**/.git/**\n\nvolumes:\n  sonarqube_data:\n  sonarqube_extensions:\n  sonarqube_logs:\n